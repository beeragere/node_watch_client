name: CI/CD React Docker Deploy

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build Docker image
      - name: Build Docker image
        run: docker build -t rateeshmalavalli99/node-watch-client:${{ github.sha }} -f Dockerfile .

      # 4. Push Docker image to registry
      - name: Push Docker image
        run: docker push rateeshmalavalli99/node-watch-client:${{ github.sha }}

      # 5. SSH to VM and deploy
      - name: SSH and deploy to VM
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            docker pull rateeshmalavalli99/node-watch-client:${{ github.sha }}
            docker stop node-watch-client || true
            docker rm node-watch-client || true
            docker run -d -p 80:80 --name node-watch-client rateeshmalavalli99/node-watch-client:${{ github.sha }}
